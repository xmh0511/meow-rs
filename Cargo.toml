[workspace]
resolver = "2"
members = [
    "crates/mihomo-common",
    "crates/mihomo-trie",
    "crates/mihomo-dns",
    "crates/mihomo-rules",
    "crates/mihomo-transport",
    "crates/mihomo-proxy",
    "crates/mihomo-tunnel",
    "crates/mihomo-listener",
    "crates/mihomo-api",
    "crates/mihomo-config",
    "crates/mihomo-app",
    "crates/mihomo-bench",
]

[profile.release]
lto = true
strip = true
codegen-units = 1
panic = "abort"
opt-level = "z"

[workspace.package]
version = "0.6.2"
edition = "2021"
rust-version = "1.88"
license = "GPL-3.0"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Networking
shadowsocks = { version = "1.21", features = ["aead-cipher-2022", "stream-cipher"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "logging", "tls12"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "logging", "std", "tls12"] }
webpki-roots = "0.26"

# DNS
hickory-resolver = "0.26"
hickory-server = "0.26"
hickory-proto = "0.26"

# Web framework
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }

# GeoIP
maxminddb = "0.27"

# Concurrency
dashmap = "6"

# Caching
lru = "0.16"

# IP handling
ipnet = "2"
iprange = "0.6"

# Crypto
sha2 = "0.10"
hex = "0.4"
subtle = "2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Time (transitive via hickory-server; explicitly declared to enable formatting)
time = { version = "0.3", features = ["formatting"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Async traits
async-trait = "0.1"

# Error handling
thiserror = "2"
anyhow = "1"

# UUID
uuid = { version = "1", features = ["v4"] }

# Regex
regex = "1"

# Byte manipulation
bytes = "1"

# Compression (mrs geosite / rule-provider binary format)
zstd = "0.13"

# Randomness
rand = "0.9"

# Base64 encoding
base64 = "0.22"

# Socket utilities
socket2 = { version = "0.5", features = ["all"] }

# Futures
futures = "0.3"
futures-util = "0.3"

# WebSocket
tokio-tungstenite = { version = "0.24", default-features = false, features = ["connect", "handshake"] }

# HTTP types
http = "1"

# Temporary files (tests)
tempfile = "3"

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }

# Parking lot for sync primitives
parking_lot = "0.12"

# Wait-free read / atomic swap for hot-path rule-set + proxy-provider refreshes
arc-swap = "1"

# BoringSSL (pulled in by mihomo-transport's boring-tls feature)
boring      = { version = "5.0.2" }
tokio-boring = { version = "5.0.0" }

# Benchmarking
criterion = { version = "0.5", features = ["html_reports"] }

# Workspace crates
# default-features = false on feature-gated crates so each consumer controls
# which optional protocols/listeners are compiled (M2.E feature-flag infra).
mihomo-common = { path = "crates/mihomo-common" }
mihomo-trie = { path = "crates/mihomo-trie" }
mihomo-dns = { path = "crates/mihomo-dns", default-features = false }
mihomo-rules = { path = "crates/mihomo-rules" }
mihomo-transport = { path = "crates/mihomo-transport" }
mihomo-proxy = { path = "crates/mihomo-proxy", default-features = false }
mihomo-tunnel = { path = "crates/mihomo-tunnel" }
mihomo-listener = { path = "crates/mihomo-listener", default-features = false }
mihomo-api = { path = "crates/mihomo-api" }
mihomo-config = { path = "crates/mihomo-config", default-features = false }
