name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.3.0) — dry-run only, no upload"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - target: x86_64-unknown-linux-musl
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: aarch64-unknown-linux-musl
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 8388608
          #   minimal_soft_gate: false
          #   openwrt_archs: >-
          #     aarch64_generic aarch64_cortex-a53 aarch64_cortex-a72
          #     aarch64_cortex-a76
          # - target: armv7-unknown-linux-musleabihf
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          #   cargo_flags: --no-default-features --features full
          #   openwrt_archs: >-
          #     arm_cortex-a7_neon-vfpv4 arm_cortex-a8_vfpv3
          #     arm_cortex-a9_vfpv3-d16 arm_cortex-a15_neon-vfpv4
          # - target: x86_64-pc-windows-msvc
          #   runner: windows-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: aarch64-pc-windows-msvc
          #   runner: windows-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: x86_64-pc-windows-gnu
          #   runner: windows-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          #   cargo_flags: --no-default-features --features full
          # - target: i686-pc-windows-msvc
          #   runner: windows-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: aarch64-unknown-linux-gnu
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: armv7-unknown-linux-gnueabihf
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: x86_64-unknown-linux-gnu
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: i686-unknown-linux-gnu
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          #   cargo_flags: --no-default-features --features full
          #   use_cross: true
          # - target: i686-unknown-linux-musl
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          #   cargo_flags: --no-default-features --features full
          #   use_cross: true
          # MIPS: tier 3 targets — use cross (Docker) with -Zbuild-std
          - target: mipsel-unknown-linux-musl
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            build_std: true
            toolchain: nightly
            cargo_flags: --no-default-features --features full
            use_cross: true
          - target: mips-unknown-linux-musl
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            build_std: true
            toolchain: nightly
            cargo_flags: --no-default-features --features full
            use_cross: true
          # - target: x86_64-apple-darwin
          #   runner: macos-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: aarch64-apple-darwin
          #   runner: macos-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          # - target: riscv64gc-unknown-linux-musl
          #   runner: ubuntu-latest
          #   minimal_budget_bytes: 0
          #   minimal_soft_gate: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            # aarch64: hard gate — release fails if minimal binary exceeds 8 MiB
            minimal_budget_bytes: 8388608
            minimal_soft_gate: false
            # Static musl binary → one build serves several OpenWrt arch
            # labels; the .ipk differs only in the Architecture field (#284).
            openwrt_archs: >-
              aarch64_generic aarch64_cortex-a53 aarch64_cortex-a72
              aarch64_cortex-a76
          - target: armv7-unknown-linux-musleabihf
            runner: ubuntu-latest
            # armv7: soft gate only for now (no ADR-0007 budget yet)
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            # boring-sys is broken on 32-bit musl (bindgen emits time64
            # `time_t: i64` per musl 1.2, while boring passes i32), so build
            # without the boring-tls default. Trade-off: no ECH/uTLS
            # fingerprinting on armv7 — everything else in `full` is present.
            cargo_flags: --no-default-features --features full
            # Rust's armv7 musleabihf baseline is vfpv3-d16 without NEON, so
            # the same binary is safe on every core listed here (#284).
            openwrt_archs: >-
              arm_cortex-a7_neon-vfpv4 arm_cortex-a8_vfpv3
              arm_cortex-a9_vfpv3-d16 arm_cortex-a15_neon-vfpv4
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: x86_64-pc-windows-gnu
            runner: windows-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            cargo_flags: --no-default-features --features full
          - target: i686-pc-windows-msvc
            runner: windows-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: armv7-unknown-linux-gnueabihf
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          # i686: use cross (Docker) — zig doesn't support i686 assembly,
          # clang causes glibc header mismatch with zigbuild's 2.17 stubs
          - target: i686-unknown-linux-gnu
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            cargo_flags: --no-default-features --features full
            use_cross: true
          - target: i686-unknown-linux-musl
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
            cargo_flags: --no-default-features --features full
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: aarch64-apple-darwin
            runner: macos-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
          - target: riscv64gc-unknown-linux-musl
            runner: ubuntu-latest
            minimal_budget_bytes: 0
            minimal_soft_gate: true
    steps:
      - uses: actions/checkout@v5

      - name: Setup Rust toolchain
        shell: bash
        run: |
          TOOLCHAIN="${{ matrix.toolchain || 'stable' }}"
          rustup toolchain install "$TOOLCHAIN" --profile minimal --no-self-update
          rustup default "$TOOLCHAIN"
          if [ "${{ matrix.build_std }}" = "true" ]; then
            rustup component add rust-src --toolchain "$TOOLCHAIN"
          else
            rustup target add "${{ matrix.target }}" --toolchain "$TOOLCHAIN"
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-${{ matrix.target }}

      - name: Install cargo-zigbuild and zig
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - run: cargo install --locked cargo-zigbuild
        if: runner.os == 'Linux'

      - name: Install cross-compilation tools
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            BUILD_STD=""
            if [ "${{ matrix.build_std }}" = "true" ]; then
              BUILD_STD="-Zbuild-std=std,panic_abort"
            fi
            cross build --release --locked ${{ matrix.cargo_flags }} $BUILD_STD --target ${{ matrix.target }} --bin meow
          elif [ "${{ runner.os }}" = "Linux" ]; then
            cargo zigbuild --release --locked ${{ matrix.cargo_flags }} --target ${{ matrix.target }} --bin meow
          else
            cargo build --release --locked ${{ matrix.cargo_flags }} --target ${{ matrix.target }} --bin meow
          fi

      - name: Build minimal release binary (stripped, for size check)
        if: matrix.minimal_budget_bytes != 0 && runner.os == 'Linux'
        run: |
          cargo zigbuild --release --locked \
            --no-default-features --features minimal \
            --target ${{ matrix.target }} \
            --bin meow
          # Copy minimal binary aside before default binary overwrites artifact.
          # Binary is already stripped via [profile.release] strip = true in
          # the workspace Cargo.toml — no post-build strip needed (and the
          # host `strip` cannot read aarch64 ELF anyway).
          cp "target/${{ matrix.target }}/release/meow" \
             "target/${{ matrix.target }}/release/meow-minimal"

      - name: Minimal binary size check
        if: matrix.minimal_budget_bytes != 0 && runner.os == 'Linux'
        run: |
          SIZE=$(stat -c%s "target/${{ matrix.target }}/release/meow-minimal")
          BUDGET=${{ matrix.minimal_budget_bytes }}
          echo "Minimal binary size: ${SIZE} bytes (budget: ${BUDGET} bytes)"
          if [ "${SIZE}" -gt "${BUDGET}" ]; then
            if [ "${{ matrix.minimal_soft_gate }}" = "true" ]; then
              echo "::warning::${{ matrix.target }} minimal binary ${SIZE} bytes exceeds soft budget ${BUDGET} bytes (ADR-0007 §1)"
            else
              echo "::error::${{ matrix.target }} minimal binary ${SIZE} bytes exceeds hard budget ${BUDGET} bytes (ADR-0007 §2)"
              exit 1
            fi
          else
            echo "Size check passed: ${SIZE} <= ${BUDGET}"
          fi

      - name: Package archive
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          # On workflow_dispatch GITHUB_REF_NAME is the *branch* name (which
          # may contain slashes and break the archive path) — use the tag
          # input instead.
          ref="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          name="meow-${ref}-${{ matrix.target }}"
          staging="dist/${name}"
          mkdir -p "${staging}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/meow.exe" "${staging}/"
            cp README.md LICENSE "${staging}/" 2>/dev/null || true
            pwsh -Command "Compress-Archive -Path 'dist/${name}' -DestinationPath '${name}.zip'"
            sha256sum "${name}.zip" > "${name}.zip.sha256"
            echo "archive=${name}.zip" >> "$GITHUB_OUTPUT"
            echo "checksum=${name}.zip.sha256" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/meow" "${staging}/"
            cp README.md LICENSE "${staging}/" 2>/dev/null || true
            tar -C dist -czf "${name}.tar.gz" "${name}"
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
            echo "archive=${name}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "checksum=${name}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          fi

      - name: Package OpenWrt ipks
        if: matrix.openwrt_archs != ''
        run: |
          set -euo pipefail
          ref="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          version="${ref#v}"
          version="${version//\//-}"
          for arch in ${{ matrix.openwrt_archs }}; do
            bash openwrt/build-ipk.sh meow \
              --binary "target/${{ matrix.target }}/release/meow" \
              --version "${version}-1" --arch "${arch}" --outdir dist-ipk
          done
          cd dist-ipk
          for f in *.ipk; do sha256sum "$f" > "$f.sha256"; done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meow-${{ matrix.target }}
          path: |
            ${{ steps.pkg.outputs.archive }}
            ${{ steps.pkg.outputs.checksum }}
            dist-ipk/*.ipk
            dist-ipk/*.ipk.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package luci-app-meow ipk (arch-independent)
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          bash openwrt/build-ipk.sh luci --version "${version}-1" --outdir dist
          cd dist
          f="luci-app-meow_${version}-1_all.ipk"
          sha256sum "$f" > "$f.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/**/*.ipk
            dist/**/*.ipk.sha256
          generate_release_notes: true
